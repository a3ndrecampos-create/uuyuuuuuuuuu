<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Blade Arena ULTRA PRO</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;600;700&family=Orbitron:wght@700;900&display=swap');

:root {
  --red:    #ff0050;
  --cyan:   #00e5ff;
  --green:  #00ff88;
  --gold:   #ffd700;
  --purple: #9b59ff;
  --plasma: #ff6bff;
  --orbit:  #00bfff;
  --gravit: #7fff00;
  --vacuo:  #c0c0ff;
  --nitro:  #ff8c00;
  --cosm:   #e040fb;
  --dark0:  #03040a;
  --dark1:  #080c18;
  --dark2:  #0d1225;
  --dark3:  #121830;
  --panel:  rgba(8,12,28,0.92);
  --border: rgba(0,229,255,0.18);
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

body {
  background: var(--dark0);
  color: #e0e8ff;
  font-family: 'Rajdhani', sans-serif;
  overflow: hidden;
  display: flex;
  flex-direction: column;
  align-items: center;
  min-height: 100vh;
  position: relative;
}

/* ── GRID DE FUNDO ── */
body::before {
  content: '';
  position: fixed;
  inset: 0;
  background-image:
    linear-gradient(rgba(0,229,255,0.03) 1px, transparent 1px),
    linear-gradient(90deg, rgba(0,229,255,0.03) 1px, transparent 1px);
  background-size: 40px 40px;
  pointer-events: none;
  z-index: 0;
}

/* ─── TICKER RANKING ─── */
#topRanking {
  width: 100vw;
  overflow: hidden;
  white-space: nowrap;
  background: linear-gradient(90deg, var(--dark0) 0%, var(--dark2) 50%, var(--dark0) 100%);
  border-bottom: 1px solid var(--border);
  padding: 7px 0;
  position: relative;
  z-index: 10;
  box-shadow: 0 4px 30px rgba(0,229,255,0.08);
  height: 45px;
}

#topRanking::before,
#topRanking::after {
  content: '';
  position: absolute;
  top: 0; bottom: 0; width: 80px;
  z-index: 2;
  pointer-events: none;
}
#topRanking::before { left: 0; background: linear-gradient(90deg, var(--dark0), transparent); }
#topRanking::after  { right: 0; background: linear-gradient(-90deg, var(--dark0), transparent); }

.rankScrollContainer {
  display: inline-flex;
  gap: 12px;
  animation: rankScroll 22s linear infinite;
  padding-left: 100%;
}
@keyframes rankScroll {
  0%   { transform: translateX(0); }
  100% { transform: translateX(-130%); }
}

.rankCard {
  background: linear-gradient(135deg, rgba(13,18,37,0.95), rgba(18,24,48,0.95));
  border: 1px solid var(--border);
  border-radius: 6px;
  padding: 5px 12px;
  display: flex;
  align-items: center;
  gap: 8px;
  font-size: 13px;
  font-weight: 600;
  letter-spacing: 0.5px;
  flex: 0 0 auto;
  box-shadow: inset 0 0 12px rgba(0,229,255,0.04), 0 2px 8px rgba(0,0,0,0.5);
  transition: border-color 0.3s;
}
.rankCard.rank1 { border-color: rgba(255,215,0,0.5); }
.rankCard.rank2 { border-color: rgba(192,192,192,0.4); }
.rankCard.rank3 { border-color: rgba(205,127,50,0.4); }

.rankAvatar {
  width: 28px; height: 28px;
  border-radius: 50%;
  overflow: hidden;
  border: 1px solid var(--border);
  background: var(--dark2);
  flex-shrink: 0;
}
.rankAvatar img { width: 100%; height: 100%; object-fit: cover; }

.rankPos {
  font-family: 'Orbitron', sans-serif;
  font-size: 10px;
  color: var(--gold);
}

/* ─── LAYOUT CENTRAL ─── */
#layout {
  display: grid;
  grid-template-columns: 200px 1fr 200px;
  gap: 10px;
  align-items: start;
  width: 100%;
  max-width: 1100px;
  padding: 8px 10px;
  position: relative;
  z-index: 1;
}

/* ─── PAINEL LATERAL ─── */
.sidePanel {
  display: flex;
  flex-direction: column;
  gap: 8px;
}

.panelBox {
  background: var(--panel);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 12px;
  position: relative;
  overflow: hidden;
}
.panelBox::before {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0; height: 2px;
  background: linear-gradient(90deg, transparent, var(--cyan), transparent);
  opacity: 0.4;
}

.panelTitle {
  font-family: 'Orbitron', sans-serif;
  font-size: 9px;
  letter-spacing: 2px;
  color: var(--cyan);
  text-transform: uppercase;
  margin-bottom: 8px;
  opacity: 0.7;
}

/* ─── PODERES NO PAINEL ─── */
.powerList { display: flex; flex-direction: column; gap: 6px; }

.powerItem {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 6px 8px;
  border-radius: 6px;
  border: 1px solid transparent;
  font-size: 12px;
  font-weight: 600;
  transition: all 0.2s;
  cursor: default;
}
.powerItem:hover { transform: translateX(2px); }

.powerDot {
  width: 8px; height: 8px;
  border-radius: 50%;
  flex-shrink: 0;
}

.power-nitrox   { background: rgba(255,140,0,0.12); border-color: rgba(255,140,0,0.3);  color: var(--nitro); }
.power-orbita   { background: rgba(0,191,255,0.12); border-color: rgba(0,191,255,0.3);  color: var(--orbit); }
.power-plasma   { background: rgba(255,107,255,0.12);border-color:rgba(255,107,255,0.3);color: var(--plasma);}
.power-vacuo    { background: rgba(192,192,255,0.12);border-color:rgba(192,192,255,0.3);color: var(--vacuo); }
.power-cosmis   { background: rgba(224,64,251,0.12); border-color: rgba(224,64,251,0.3); color: var(--cosm); }
.power-gravit   { background: rgba(127,255,0,0.12);  border-color: rgba(127,255,0,0.3);  color: var(--gravit);}

.powerDot.nitrox { background: var(--nitro);  box-shadow: 0 0 6px var(--nitro); }
.powerDot.orbita { background: var(--orbit);  box-shadow: 0 0 6px var(--orbit); }
.powerDot.plasma { background: var(--plasma); box-shadow: 0 0 6px var(--plasma); }
.powerDot.vacuo  { background: var(--vacuo);  box-shadow: 0 0 6px var(--vacuo); }
.powerDot.cosmis { background: var(--cosm);   box-shadow: 0 0 6px var(--cosm); }
.powerDot.gravit { background: var(--gravit); box-shadow: 0 0 6px var(--gravit); }

.powerDmg {
  margin-left: auto;
  font-family: 'Orbitron', sans-serif;
  font-size: 9px;
  opacity: 0.7;
}

/* ─── STATUS ONLINE ─── */
.statusRow {
  display: flex;
  align-items: center;
  gap: 8px;
  font-size: 13px;
  font-weight: 600;
  letter-spacing: 1px;
}
.dot {
  width: 10px; height: 10px;
  border-radius: 50%;
  background: #ff2233;
  transition: all 0.5s;
}
.dot.online {
  background: var(--green);
  box-shadow: 0 0 10px var(--green), 0 0 20px rgba(0,255,136,0.3);
  animation: pulse 2s infinite;
}
@keyframes pulse {
  0%,100% { box-shadow: 0 0 8px var(--green); }
  50%      { box-shadow: 0 0 18px var(--green), 0 0 30px rgba(0,255,136,0.4); }
}

/* ─── CENTRO ─── */
#centerCol {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 8px;
}

/* ─── TÍTULO ─── */
#gameTitle {
  font-family: 'Orbitron', sans-serif;
  font-size: 20px;
  font-weight: 900;
  letter-spacing: 4px;
  text-transform: uppercase;
  background: linear-gradient(135deg, var(--red), var(--plasma), var(--cyan));
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  filter: drop-shadow(0 0 12px rgba(255,0,80,0.4));
  text-align: center;
}

/* ─── TIMER ─── */
#timerWrap {
  width: 100%;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 4px;
}

#timerText {
  font-family: 'Orbitron', sans-serif;
  font-size: 22px;
  font-weight: 700;
  letter-spacing: 4px;
  color: var(--green);
  text-shadow: 0 0 15px rgba(0,255,136,0.6);
}
#timerText.urgent { color: var(--red); text-shadow: 0 0 15px rgba(255,0,80,0.8); animation: blinkTimer 0.5s infinite; }
@keyframes blinkTimer { 50% { opacity: 0.5; } }

#timerBar {
  width: 100%;
  height: 6px;
  background: rgba(255,255,255,0.06);
  border-radius: 20px;
  overflow: hidden;
  position: relative;
}
#timerFill {
  height: 100%;
  background: linear-gradient(90deg, var(--red), var(--green));
  border-radius: 20px;
  box-shadow: 0 0 10px rgba(0,255,136,0.5);
  transition: width 1s linear, background 0.5s;
}
#timerFill.urgent { background: linear-gradient(90deg, #660000, var(--red)); box-shadow: 0 0 10px var(--red); }

/* ─── ARENA ─── */
#arenaContainer {
  position: relative;
  width: min(64vmin, 520px);
  height: min(64vmin, 520px);
  flex-shrink: 0;
}

#arenaGlow {
  position: absolute;
  inset: -20px;
  border-radius: 24px;
  background: radial-gradient(ellipse at center,
    rgba(255,0,80,0.08) 0%,
    rgba(0,229,255,0.04) 50%,
    transparent 70%);
  pointer-events: none;
  animation: arenaBreath 4s ease-in-out infinite;
}
@keyframes arenaBreath {
  0%,100% { opacity: 0.6; transform: scale(1); }
  50%      { opacity: 1;   transform: scale(1.03); }
}

#gameCanvas {
  width: 100%;
  height: 100%;
  border-radius: 14px;
  border: 1px solid rgba(0,229,255,0.2);
  background: var(--dark0);
  display: block;
  box-shadow:
    0 0 0 1px rgba(0,229,255,0.08),
    0 0 40px rgba(0,0,0,0.8),
    inset 0 0 60px rgba(0,0,0,0.4);
}

/* ─── CANTOS DA ARENA ─── */
.corner {
  position: absolute;
  width: 16px; height: 16px;
  border-color: var(--cyan);
  border-style: solid;
  opacity: 0.6;
}
.corner.tl { top: 4px; left: 4px; border-width: 2px 0 0 2px; border-radius: 4px 0 0 0; }
.corner.tr { top: 4px; right: 4px; border-width: 2px 2px 0 0; border-radius: 0 4px 0 0; }
.corner.bl { bottom: 4px; left: 4px; border-width: 0 0 2px 2px; border-radius: 0 0 0 4px; }
.corner.br { bottom: 4px; right: 4px; border-width: 0 2px 2px 0; border-radius: 0 0 4px 0; }

/* ─── FEED ─── */
#feed {
  position: absolute;
  left: 8px;
  top: 8px;
  width: 190px;
  z-index: 10;
  pointer-events: none;
}
.feed-item {
  margin-bottom: 5px;
  background: rgba(3,4,10,0.9);
  padding: 7px 10px;
  border-radius: 6px;
  font-size: 11px;
  font-weight: 600;
  letter-spacing: 0.3px;
  border-left: 3px solid var(--red);
  color: #e0e8ff;
  animation: feedIn 4s forwards;
  backdrop-filter: blur(4px);
}
@keyframes feedIn {
  0%   { opacity: 0; transform: translateX(-15px); }
  12%  { opacity: 1; transform: translateX(0); }
  80%  { opacity: 1; }
  100% { opacity: 0; transform: translateY(-10px); }
}

/* ─── VS PANEL ─── */
#vsPanel {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 20px;
  width: 100%;
}

.vsBox {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 6px;
  flex: 1;
}

.vsName {
  font-size: 11px;
  font-weight: 700;
  letter-spacing: 1px;
  color: var(--cyan);
  text-transform: uppercase;
  opacity: 0.8;
  max-width: 90px;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}

.vsHP {
  font-family: 'Orbitron', sans-serif;
  font-size: 18px;
  font-weight: 700;
  color: var(--green);
  text-shadow: 0 0 10px rgba(0,255,136,0.5);
}

.vsFullAvatar {
  width: 64px; height: 64px;
  border-radius: 12px;
  overflow: hidden;
  background: var(--dark2);
  box-shadow: 0 0 16px rgba(255,0,80,0.25);
  position: relative;
}
.vsFullAvatar::after {
  content: '';
  position: absolute;
  inset: 0;
  border-radius: 12px;
  border: 2px solid var(--red);
  pointer-events: none;
}
.vsFullAvatar img { width: 100%; height: 100%; object-fit: cover; }
.vsFullAvatar.left::after { border-color: var(--cyan); }

#vsLabel {
  font-family: 'Orbitron', sans-serif;
  font-size: 20px;
  font-weight: 900;
  color: var(--gold);
  text-shadow: 0 0 20px rgba(255,215,0,0.6);
  letter-spacing: 2px;
  animation: vsGlow 2s ease-in-out infinite;
}
@keyframes vsGlow {
  0%,100% { text-shadow: 0 0 10px rgba(255,215,0,0.4); }
  50%      { text-shadow: 0 0 25px rgba(255,215,0,0.9), 0 0 50px rgba(255,215,0,0.3); }
}

/* ─── BOTÃO CONFIG ─── */
#configBtn {
  background: linear-gradient(135deg, rgba(255,0,80,0.2), rgba(255,0,80,0.1));
  color: var(--red);
  border: 1px solid rgba(255,0,80,0.4);
  padding: 8px 18px;
  border-radius: 8px;
  cursor: pointer;
  font-family: 'Rajdhani', sans-serif;
  font-weight: 700;
  font-size: 12px;
  letter-spacing: 2px;
  text-transform: uppercase;
  transition: all 0.25s;
  align-self: stretch;
}
#configBtn:hover {
  background: linear-gradient(135deg, rgba(255,0,80,0.35), rgba(255,0,80,0.2));
  box-shadow: 0 0 16px rgba(255,0,80,0.3);
  transform: translateY(-1px);
}

/* ─── MODAL CONFIG ─── */
.modal {
  display: none;
  position: fixed;
  bottom: 20px;
  left: 50%;
  transform: translateX(-50%);
  width: 360px;
  background: rgba(8,12,28,0.97);
  border: 1px solid rgba(255,0,80,0.3);
  border-radius: 14px;
  padding: 18px;
  z-index: 9999;
  box-shadow: 0 0 40px rgba(255,0,80,0.15), 0 20px 60px rgba(0,0,0,0.8);
  backdrop-filter: blur(20px);
}
.modal-title {
  font-family: 'Orbitron', sans-serif;
  font-size: 11px;
  letter-spacing: 2px;
  color: var(--red);
  margin-bottom: 12px;
  text-transform: uppercase;
}
.modal input, .modal select {
  width: 100%;
  margin-bottom: 8px;
  padding: 9px 12px;
  background: rgba(255,255,255,0.05);
  border: 1px solid rgba(255,255,255,0.1);
  color: #e0e8ff;
  border-radius: 8px;
  font-family: 'Rajdhani', sans-serif;
  font-size: 13px;
  font-weight: 600;
  outline: none;
  transition: border-color 0.2s;
}
.modal input:focus, .modal select:focus { border-color: rgba(0,229,255,0.4); }
.modal select option { background: var(--dark1); }
.modal button[onclick="addEvent()"] {
  width: 100%;
  background: linear-gradient(135deg, rgba(255,0,80,0.3), rgba(255,0,80,0.15));
  color: var(--red);
  border: 1px solid rgba(255,0,80,0.4);
  padding: 9px;
  border-radius: 8px;
  cursor: pointer;
  font-family: 'Rajdhani', sans-serif;
  font-weight: 700;
  font-size: 13px;
  letter-spacing: 1px;
  text-transform: uppercase;
  margin-bottom: 10px;
  transition: all 0.2s;
}
.modal button[onclick="addEvent()"]:hover { background: rgba(255,0,80,0.4); }

.event-item {
  border-bottom: 1px solid rgba(255,255,255,0.06);
  padding: 7px 0;
  font-size: 12px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  font-weight: 600;
  color: rgba(224,232,255,0.7);
}
.deleteBtn {
  background: rgba(255,0,80,0.2);
  border: 1px solid rgba(255,0,80,0.3);
  color: var(--red);
  width: 24px; height: 24px;
  border-radius: 50%;
  cursor: pointer;
  font-size: 10px;
  font-weight: 700;
  transition: all 0.2s;
}
.deleteBtn:hover { background: var(--red); color: white; }

/* ─── KILLS COUNTER ─── */
#killCounter {
  position: absolute;
  right: 8px;
  top: 8px;
  background: rgba(3,4,10,0.85);
  border: 1px solid rgba(255,0,80,0.3);
  border-radius: 6px;
  padding: 5px 9px;
  font-size: 10px;
  font-family: 'Orbitron', sans-serif;
  letter-spacing: 1px;
  color: var(--red);
  backdrop-filter: blur(4px);
  z-index: 10;
}

/* ─── POWER FX OVERLAY ─── */
#powerOverlay {
  position: absolute;
  inset: 0;
  border-radius: 14px;
  pointer-events: none;
  z-index: 5;
  opacity: 0;
  transition: opacity 0.3s;
}
#powerOverlay.show { opacity: 1; animation: powerFlash 0.5s forwards; }
@keyframes powerFlash {
  0%   { opacity: 0.8; }
  100% { opacity: 0; }
}
</style>
</head>
<body>

<!-- ── TICKER ── -->
<div id="topRanking"></div>

<!-- ── LAYOUT ── -->
<div id="layout">

  <!-- PAINEL ESQUERDO -->
  <div class="sidePanel">
    <div class="panelBox">
      <div class="panelTitle">⚡ Poderes</div>
      <div class="powerList">
        <div class="powerItem power-nitrox">
          <div class="powerDot nitrox"></div>
          NITROX
          <span class="powerDmg">18 DMG</span>
        </div>
        <div class="powerItem power-orbita">
          <div class="powerDot orbita"></div>
          ÓRBITA
          <span class="powerDmg">22 DMG</span>
        </div>
        <div class="powerItem power-plasma">
          <div class="powerDot plasma"></div>
          PLASMA
          <span class="powerDmg">28 DMG</span>
        </div>
        <div class="powerItem power-vacuo">
          <div class="powerDot vacuo"></div>
          VÁCUO
          <span class="powerDmg">20 DMG</span>
        </div>
        <div class="powerItem power-cosmis">
          <div class="powerDot cosmis"></div>
          CÓSMIS
          <span class="powerDmg">35 DMG</span>
        </div>
        <div class="powerItem power-gravit">
          <div class="powerDot gravit"></div>
          GRAVIT
          <span class="powerDmg">45 DMG</span>
        </div>
      </div>
    </div>

    <div class="panelBox">
      <div class="panelTitle">◉ Conexão</div>
      <div class="statusRow">
        <div id="connDot" class="dot"></div>
        <span id="statusText">OFFLINE</span>
      </div>
    </div>

    <div class="panelBox">
      <div class="panelTitle">⚔ Placar</div>
      <div id="vsPanel">
        <div class="vsBox">
          <div class="vsFullAvatar left"><img id="vsFull1" src="data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='64' height='64'><rect width='64' height='64' fill='%230d1225'/></svg>"></div>
          <div class="vsName" id="vsName1">—</div>
          <div class="vsHP" id="vsScore1">0</div>
        </div>
        <div id="vsLabel">VS</div>
        <div class="vsBox">
          <div class="vsFullAvatar"><img id="vsFull2" src="data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='64' height='64'><rect width='64' height='64' fill='%230d1225'/></svg>"></div>
          <div class="vsName" id="vsName2">—</div>
          <div class="vsHP" id="vsScore2">0</div>
        </div>
      </div>
    </div>
  </div>

  <!-- CENTRO -->
  <div id="centerCol">
    <div id="gameTitle">⚔ BLADE ARENA ⚔</div>

    <div id="timerWrap">
      <div id="timerText">2:00</div>
      <div id="timerBar"><div id="timerFill"></div></div>
    </div>

    <div id="arenaContainer">
      <div id="arenaGlow"></div>
      <div class="corner tl"></div>
      <div class="corner tr"></div>
      <div class="corner bl"></div>
      <div class="corner br"></div>
      <canvas id="gameCanvas"></canvas>
      <div id="feed"></div>
      <div id="killCounter">☠ 0 KILLS</div>
      <div id="powerOverlay"></div>
    </div>
  </div>

  <!-- PAINEL DIREITO -->
  <div class="sidePanel">
    <div class="panelBox">
      <div class="panelTitle">🏆 Ranking</div>
      <div id="sideRanking" style="display:flex;flex-direction:column;gap:5px;font-size:12px;font-weight:600;"></div>
    </div>

    <div class="panelBox">
      <div class="panelTitle">⚙ Controles</div>
      <button id="configBtn">CONFIG EVENTOS</button>
    </div>

    <div class="panelBox" id="activeBuffBox">
      <div class="panelTitle">🔮 Efeitos Ativos</div>
      <div id="activeBuffList" style="font-size:11px;display:flex;flex-direction:column;gap:4px;color:rgba(224,232,255,0.6);">
        Nenhum efeito ativo
      </div>
    </div>
  </div>

</div>

<!-- MODAL CONFIG -->
<div id="configModal" class="modal">
  <div class="modal-title">⚙ Config Eventos</div>
  <input id="cmdInput" placeholder="rose / galaxy / like / member">
  <select id="actionSelect">
    <option value="SPAWN">⚡ SPAWN</option>
    <option value="LIKE">❤️ LIKE (+HP)</option>
    <option value="PLUS100">+100 HP</option>
    <option value="PLUS500">+500 HP</option>
    <option value="PLUS1000">+1000 HP</option>

/* ══════════════════════════════════════

/* ══════════════════════════════════════

══════════════════════════════════════ */
const SPRITE_DATA = {
  nitrox: { cols: 6, rows: 6, frameW: 548, frameH: 524, totalFrames: 36, duration: 68 }, // nitrox.json[cite: 6, 9]
  orbita: { cols: 6, rows: 6, frameW: 640, frameH: 640, totalFrames: 36, duration: 58 }, // Órbita.json[cite: 4, 7]
  plasma: { cols: 6, rows: 6, frameW: 640, frameH: 640, totalFrames: 36, duration: 50 }, // Plasma.json[cite: 5]
  vacuo:  { cols: 6, rows: 6, frameW: 548, frameH: 524, totalFrames: 36, duration: 68 }, // vacuo.json[cite: 6, 9]
  cosmis: { cols: 6, rows: 6, frameW: 640, frameH: 640, totalFrames: 36, duration: 58 }, // Cósmis.json[cite: 4, 7]

/* ══════════════════════════════════════

const POWERS = {

};

/* ══════════════════════════════════════
   SISTEMA DE PARTÍCULAS ORIGINAL[cite: 3, 10]
══════════════════════════════════════ */
function spawnParticles(x, y, color, count, speed=10, gravity=0.15) {
  for (let i = 0; i < count; i++) {
    const angle = Math.random() * Math.PI * 2;
    const spd   = (Math.random() * 0.6 + 0.4) * speed;
    particles.push({
      x, y,
      vx: Math.cos(angle) * spd,
      vy: Math.sin(angle) * spd,
      size: Math.random() * 4 + 1.5,
      color,
      life: 1.0,
      decay: Math.random() * 0.025 + 0.015,
      gravity,
      glow: true,
      type: 'spark'
    });
  }
}

function spawnRing(x, y, color, radius=60) {
  particles.push({ type: 'ring', x, y, color, radius: 5, maxRadius: radius, life: 1, decay: 0.04 });
}

function spawnLightning(x1, y1, x2, y2, color) {
  particles.push({ type: 'lightning', x1, y1, x2, y2, color, life: 1, decay: 0.15 });
}

function spawnStardust(x, y, color, count=15) {
  for (let i = 0; i < count; i++) {
    const angle = Math.random() * Math.PI * 2;
    const spd   = Math.random() * 5 + 1;
    particles.push({
      x, y,
      vx: Math.cos(angle) * spd,
      vy: Math.sin(angle) * spd - 2,
      size: Math.random() * 3 + 1,
      color,
      life: 1.0,
      decay: Math.random() * 0.02 + 0.01,
      gravity: -0.05,
      glow: true,
      type: 'star'
    });
  }
}

function spawnBlackhole(x, y) {
  particles.push({ type: 'blackhole', x, y, life: 1, decay: 0.008, radius: 0, maxRadius: 80, color: '#7fff00' });
}

/* ══════════════════════════════════════
   IMPACT & FEED ORIGINAL[cite: 3, 10]
══════════════════════════════════════ */
function createImpact(x, y, text, color, power) {
  damages.push({ x, y, text, color, life: 50, size: 22 });
  const p = power || { particleCount: 12, trailColor: color };
  spawnParticles(x, y, color, p.particleCount || 12, 12);
  spawnRing(x, y, color, 50);

  if (power?.effect === 'shock') {
    for (let i = 0; i < 3; i++) {
      const tx = x + (Math.random()-0.5)*120;
      const ty = y + (Math.random()-0.5)*120;
      spawnLightning(x, y, tx, ty, color);
    }
  }
  if (power?.effect === 'cosmic') {
    spawnStardust(x, y, color, 25);
    spawnRing(x, y, color, 90);
  }
  if (power?.effect === 'blackhole') {
    spawnBlackhole(x, y);
    spawnRing(x, y, color, 120);
    spawnParticles(x, y, color, 60, 18);
  }
}

function addFeed(msg, color='#e0e8ff') {
  const id = Date.now() + Math.random();
  feedData.push({ id, msg, color });
  setTimeout(() => { feedData = feedData.filter(f => f.id !== id); }, 4000);
}

/* ══════════════════════════════════════
   PLAYER CLASS ORIGINAL INTEGRAL[cite: 3, 10]
══════════════════════════════════════ */
class BladePlayer {
  constructor(name, color, avatarUrl) {
    this.name       = name;
    this.color      = color;
    this.hp         = 100;
    this.kills      = 0;
    this.wins       = 0;
    this.shield     = 0;
    this.avatar     = new Image();
    if (avatarUrl) {
      this.avatar.src = avatarUrl;
    }
    this.power      = POWERS.base;
    this.powerTimeout = null;

    this.x     = Math.random() * 500 + 100;
    this.y     = Math.random() * 500 + 100;
    this.angle = Math.random() * Math.PI * 2;
    this.spin  = 0;

    // Gerenciador de frames das sprites
    this.currentSpriteFrame = 0;
    this.lastFrameTime = Date.now();

    this.burnTimer   = 0;
    this.orbitAngle  = 0;
    this.pullRadius  = 0;
    this.bholeParts  = [];
    this.trail = [];
  }

  size() {
    const v = Math.min(this.hp, 1500);
    return Math.max(20, Math.sqrt(v) * 3);
  }

  formatHP() {
    if (this.hp >= 1000) return (Math.floor(this.hp/100)/10) + 'k';
    return Math.floor(this.hp);
  }

  setPower(pId) {
    const p = POWERS[pId];
    if (!p) return;
    this.power = p;
    this.currentSpriteFrame = 0;
    this.lastFrameTime = Date.now();

    clearTimeout(this.powerTimeout);
    if (p.duration > 0) {
      this.powerTimeout = setTimeout(() => { this.power = POWERS.base; }, p.duration);
    }
    spawnRing(this.x, this.y, p.color, 80);
    spawnParticles(this.x, this.y, p.color, 40, 14);
    if (p.isUltimate) {
      flashArena(p.color);
      addFeed(`☄️ ${this.name} ativou ${p.name}!`, p.color);
    } else {
      addFeed(`${p.icon} ${this.name} → ${p.name}`, p.color);
    }
  }

  update() {
    const r = this.size();
    this.spin += 0.25 + (this.power.bladeCount / 100);
    if (this.shield > 0) this.shield--;

    this.trail.push({ x: this.x, y: this.y, life: 1 });
    if (this.trail.length > 12) this.trail.shift();
    this.trail.forEach(t => t.life -= 0.08);

    // Atualização matemática da troca de frames baseada no FPS do JSON original
    if (this.power.spriteName) {
      const sData = SPRITE_DATA[this.power.spriteName];
      const now = Date.now();
      if (now - this.lastFrameTime >= sData.duration) {
        this.currentSpriteFrame = (this.currentSpriteFrame + 1) % sData.totalFrames;
        this.lastFrameTime = now;
      }
    }

    if (this.power.effect === 'orbit') {
      this.orbitAngle += 0.12;
      const ox = this.x + Math.cos(this.orbitAngle) * (r + 20);
      const oy = this.y + Math.sin(this.orbitAngle) * (r + 20);
      if (Math.random() < 0.4) {
        particles.push({ type: 'star', x: ox, y: oy, vx: 0, vy: -0.5, size: 3, color: this.power.color, life: 0.8, decay: 0.06, gravity: 0, glow: true });
      }
    }

    if (this.power.effect === 'burn' && Math.random() < 0.3) {
      spawnParticles(this.x + (Math.random()-0.5)*r, this.y - r*0.5, '#ff6600', 2, 4, -0.1);
    }

    if (this.power.effect === 'pull') {
      players.forEach(p => {
        if (p === this) return;
        const dx = this.x - p.x;
        const dy = this.y - p.y;
        const dist = Math.hypot(dx, dy);
        if (dist < 200 && dist > 5) {
          p.x += (dx/dist) * 1.2;
          p.y += (dy/dist) * 1.2;
        }
      });
    }

    if (this.power.effect === 'blackhole') {
      players.forEach(p => {
        if (p === this) return;
        const dx = this.x - p.x;
        const dy = this.y - p.y;
        const dist = Math.hypot(dx, dy);
        if (dist < 350 && dist > 5) {
          p.x += (dx/dist) * 2.5;
          p.y += (dy/dist) * 2.5;
        }
      });
    }

    this.x += Math.cos(this.angle) * 2.5;
    this.y += Math.sin(this.angle) * 2.5;

    if (this.x < r)         { this.x = r;         this.angle = Math.PI - this.angle; }
    else if (this.x > 700-r){ this.x = 700-r;      this.angle = Math.PI - this.angle; }
    if (this.y < r)         { this.y = r;           this.angle *= -1; }
    else if (this.y > 700-r){ this.y = 700-r;       this.angle *= -1; }
  }

  draw() {
    const r   = this.size();
    const p   = this.power;
    const blc = Math.floor(Math.min(p.bladeCount, 8 + r/5));

    this.trail.forEach((t, i) => {
      if (t.life <= 0) return;
      ctx.save();
      ctx.globalAlpha = t.life * 0.18;
      ctx.fillStyle = p.color;
      ctx.shadowBlur = 10;
      ctx.shadowColor = p.color;
      ctx.beginPath();
      ctx.arc(t.x, t.y, r * 0.4 * t.life, 0, Math.PI*2);
      ctx.fill();
      ctx.restore();
    });

    ctx.save();
    ctx.globalAlpha = 0.15 + Math.sin(Date.now()/300)*0.05;
    const grad = ctx.createRadialGradient(this.x, this.y, r*0.5, this.x, this.y, r*2.2);
    grad.addColorStop(0, p.color);
    grad.addColorStop(1, 'transparent');
    ctx.fillStyle = grad;
    ctx.beginPath();
    ctx.arc(this.x, this.y, r*2.2, 0, Math.PI*2);
    ctx.fill();
    ctx.restore();

    // REMENDO SEGURO: Se a sprite real PNG terminar de carregar, renderiza ela!
    if (p.spriteName && spriteLoaded[p.spriteName]) {
      const sData = SPRITE_DATA[p.spriteName];
      const img = spriteImages[p.spriteName];
      
      const col = this.currentSpriteFrame % sData.cols;
      const row = Math.floor(this.currentSpriteFrame / sData.cols);
      
      const sx = col * sData.frameW;
      const sy = row * sData.frameH;

      ctx.save();
      ctx.translate(this.x, this.y);
      ctx.rotate(this.spin); 
      ctx.shadowBlur = p.bladeGlow;
      ctx.shadowColor = p.color;
      
      const spriteRadius = r * 2.3; 
      ctx.drawImage(
        img,
        sx, sy, sData.frameW, sData.frameH,
        -spriteRadius, -spriteRadius, spriteRadius * 2, spriteRadius * 2
      );
      ctx.restore();
    } else {
      // Sistema vetorial original mantido intacto para a BASE e fallback de segurança
      ctx.save();
      ctx.translate(this.x, this.y);
      ctx.rotate(this.spin);
      ctx.shadowBlur = p.bladeGlow;
      ctx.shadowColor = p.color;

      for (let i = 0; i < blc; i++) {
        ctx.rotate((Math.PI*2) / blc);
        ctx.beginPath();
        const bl = r + r * 0.3;
        const bw = r * 0.11;
        ctx.moveTo(0, 0);
        ctx.lineTo(bl, -bw);
        ctx.lineTo(bl*1.05, 0);
        ctx.lineTo(bl, bw);
        ctx.closePath();

        const lg = ctx.createLinearGradient(0, 0, bl, 0);
        lg.addColorStop(0, 'rgba(255,255,255,0.9)');
        lg.addColorStop(0.4, p.color);
        lg.addColorStop(1, 'transparent');
        ctx.fillStyle = lg;
        ctx.fill();
      }
      ctx.restore();
    }

    // ─── AVATAR ORIGINAL ───
    ctx.save();
    ctx.beginPath();
    ctx.arc(this.x, this.y, r, 0, Math.PI*2);
    ctx.clip();
    if (this.avatar && this.avatar.complete && this.avatar.src) {
      ctx.drawImage(this.avatar, this.x-r, this.y-r, r*2, r*2);
    } else {
      const fg = ctx.createRadialGradient(this.x-r*0.3, this.y-r*0.3, 0, this.x, this.y, r);
      fg.addColorStop(0, '#ffffff33');
      fg.addColorStop(1, this.color);
      ctx.fillStyle = fg;
      ctx.fillRect(this.x-r, this.y-r, r*2, r*2);
    }
    ctx.restore();

    ctx.save();
    ctx.beginPath();
    ctx.arc(this.x, this.y, r, 0, Math.PI*2);
    ctx.strokeStyle = p.color;
    ctx.lineWidth   = 2.5;
    ctx.shadowBlur  = 12;
    ctx.shadowColor = p.color;
    ctx.stroke();
    ctx.restore();

    if (this.shield > 0) {
      const t = Date.now() / 800;
      ctx.save();
      for (let s = 0; s < 2; s++) {
        ctx.beginPath();
        ctx.arc(this.x, this.y, r + 12 + s*5, 0, Math.PI*2);
        ctx.strokeStyle = `rgba(0,229,255,${0.6 - s*0.25})`;
        ctx.lineWidth   = 3 - s;
        ctx.shadowBlur  = 20;
        ctx.shadowColor = '#00e5ff';
        ctx.setLineDash([10 + s*5, 8]);
        ctx.lineDashOffset = t * 30 * (s?-1:1);
        ctx.stroke();
      }
      ctx.setLineDash([]);
      ctx.restore();
    }

    if (this.power.effect === 'orbit') {
      ctx.save();
      ctx.strokeStyle = this.power.color + '44';
      ctx.lineWidth   = 1;
      ctx.setLineDash([4, 6]);
      ctx.beginPath();
      ctx.arc(this.x, this.y, r + 20, 0, Math.PI*2);
      ctx.stroke();
      ctx.setLineDash([]);
      const ox = this.x + Math.cos(this.orbitAngle) * (r + 20);
      const oy = this.y + Math.sin(this.orbitAngle) * (r + 20);
      ctx.fillStyle   = this.power.color;
      ctx.shadowBlur  = 14;
      ctx.shadowColor = this.power.color;
      ctx.beginPath();
      ctx.arc(ox, oy, 5, 0, Math.PI*2);
      ctx.fill();
      ctx.restore();
    }

    ctx.save();
    ctx.font          = `bold ${r*0.52}px Rajdhani`;
    ctx.textAlign     = 'center';
    ctx.textBaseline  = 'middle';
    ctx.strokeStyle   = 'rgba(0,0,0,0.9)';
    ctx.lineWidth     = 5;
    ctx.strokeText(this.formatHP(), this.x, this.y);
    ctx.fillStyle     = '#ffffff';
    ctx.fillText(this.formatHP(), this.x, this.y);
    ctx.restore();

    if (this.power.id !== 'base') {
      ctx.save();
      ctx.font        = `${Math.max(10, r*0.38)}px Arial`;
      ctx.textAlign   = 'center';
      ctx.fillText(this.power.icon, this.x, this.y - r - 8);
      ctx.restore();
    }
  }
}

/* ══════════════════════════════════════
   COMBATE ORIGINAL[cite: 3, 10]
══════════════════════════════════════ */
function combat() {
  for (let i = 0; i < players.length; i++) {
    for (let j = i+1; j < players.length; j++) {
      const a    = players[i];
      const b    = players[j];
      const dist = Math.hypot(a.x-b.x, a.y-b.y);
      if (dist < a.size() + b.size()) {
        if (a.shield <= 0) a.hp -= b.power.damage;
        if (b.shield <= 0) b.hp -= a.power.damage;
        const mx = (a.x+b.x)/2;
        const my = (a.y+b.y)/2;
        createImpact(mx, my, '-'+a.power.damage, a.power.color, a.power);
        const ba = Math.atan2(a.y-b.y, a.x-b.x);
        a.angle  = ba;
        b.angle  = ba + Math.PI;
      }
    }
  }
  players.forEach(p => {
    if (p.power.effect === 'burn') {
      players.forEach(o => {
        if (o === p) return;
        const dist = Math.hypot(p.x-o.x, p.y-o.y);
        if (dist < p.size()+o.size()+30 && o.shield <= 0) {
          o.hp -= 0.3;
          if (Math.random()<0.1) spawnParticles(o.x, o.y, '#ff6600', 3, 3, -0.05);
        }
      });
    }
  });

  const before = players.length;
  players = players.filter(p => p.hp > 0);
  const killed = before - players.length;
  if (killed > 0) {
    totalKills += killed;
    document.getElementById('killCounter').textContent = `☠ ${totalKills} KILLS`;
  }
}

/* ══════════════════════════════════════
   RANKING & UI ORIGINAL (DESACOPLADO DO LOOP INTERNO)[cite: 3, 10]
══════════════════════════════════════ */
function ranking() { return [...players].sort((a,b) => b.hp - a.hp); }

const MEDAL = ['🥇','🥈','🥉'];

      <span>${p.power.icon} <b>${p.name}</b> ❤️${p.formatHP()} 🏆${p.wins}</span>
    </div>`;
  });
  html += '</div>';
  document.getElementById('topRanking').innerHTML = html;

  if (rank[0]) {
    if(rank[0].avatar && rank[0].avatar.src) document.getElementById('vsFull1').src = rank[0].avatar.src;
    document.getElementById('vsScore1').textContent = rank[0].formatHP();

  }
  if (rank[1]) {

    document.getElementById('vsScore2').textContent = rank[1].formatHP();
    document.getElementById('vsName2').textContent  = rank[1].name;
  }

  const sr = document.getElementById('sideRanking');
  sr.innerHTML = rank.slice(0,6).map((p,i) =>
    `<div style="display:flex;align-items:center;gap:6px;padding:4px 0;border-bottom:1px solid rgba(255,255,255,0.05);">
      <span style="color:${i<3?'#ffd700':'rgba(224,232,255,0.5)'};font-family:Orbitron;font-size:10px;width:18px;">${MEDAL[i]||i+1}</span>
      <span style="color:${p.power.color};flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">${p.name}</span>
      <span style="font-family:Orbitron;font-size:10px;color:rgba(0,255,136,0.8);">${p.formatHP()}</span>
    </div>`
  ).join('');

  const active = players.filter(p => p.power.id !== 'base');
  const abl    = document.getElementById('activeBuffList');
  if (active.length === 0) {
    abl.textContent = 'Nenhum efeito ativo';
  } else {
    abl.innerHTML = active.map(p =>
      `<div style="display:flex;align-items:center;gap:5px;color:${p.power.color};">
        ${p.power.icon} <b>${p.name}</b> → ${p.power.name}
      </div>`
    ).join('');
  }

  document.getElementById('feed').innerHTML =
    feedData.map(f => `<div class="feed-item" style="border-color:${f.color||'#ff0050'}">${f.msg}</div>`).join('');
}

setInterval(() => {
  roundTimer--;
  const urgent = roundTimer <= 20;
  const el  = document.getElementById('timerText');
  const bar = document.getElementById('timerFill');
  el.className  = urgent ? 'urgent' : '';
  bar.className = urgent ? 'urgent' : '';

  if (roundTimer <= 0) {
    const r = ranking();
    if (r[0]) { r[0].wins++; addFeed(`🏆 ${r[0].name} venceu rodada!`, '#ffd700'); }
    roundTimer = 120;
    if (r[0]) { spawnParticles(350,350,'#ffd700',80,16,0.05); spawnRing(350,350,'#ffd700',200); }
  }
  const mins = Math.floor(roundTimer/60);
  const secs = roundTimer % 60;
  el.textContent  = `${mins}:${secs<10?'0':''}${secs}`;
  bar.style.width = (roundTimer/120)*100 + '%';
}, 1000);

/* ══════════════════════════════════════
   TIKFINITY COMPLETO COM ANTI-LOOP RECURSIVO[cite: 3, 10]
══════════════════════════════════════ */
let wsTimeout = null;
function connectTikFinity() {
  clearTimeout(wsTimeout);
  const socket = new WebSocket("ws://localhost:21213/");
  const dot    = document.getElementById("connDot");
  const txt    = document.getElementById("statusText");
  
  socket.onopen  = () => { dot.className = "dot online"; txt.textContent = "ONLINE"; };
  socket.onclose = () => { 
    dot.className = "dot"; 
    txt.textContent = "OFFLINE"; 
    wsTimeout = setTimeout(connectTikFinity, 5000); 
  };
  socket.onerror = () => { socket.close(); };
  
  socket.onmessage = (e) => {
    try {
      let res    = JSON.parse(e.data);
      let d      = res.data || res;
      let ev     = (res.event || "").toLowerCase();
      let trigger = ev==="member" ? "member" : (ev==="gift" ? d.giftName : (ev==="like" ? "like" : (ev==="chat" ? d.comment : ev)));
      if (!trigger) return;
      let act = eventMappings[trigger.toLowerCase().trim()];
      if (!act) return;
      let player = getPlayer(d.uniqueId);

      if (act === "SPAWN") {
        if (players.length >= MAX_PLAYERS || player) return;
        const np = new BladePlayer(d.uniqueId, randomColor(), d.profilePictureUrl);
        players.push(np);
        spawnParticles(np.x, np.y, np.color, 20, 8);
        addFeed(`⚡ ${d.uniqueId} entrou na arena`);
      }
      if (act === "LIKE" && player) {
        const gain = (d.likeCount || 1) * 1;
        player.hp += gain;
        createImpact(player.x, player.y, '+'+gain, '#ff0050');
      }
      if (act.startsWith("PLUS") && player) {
        const val = parseInt(act.replace("PLUS",""));
        player.hp += val;
        createImpact(player.x, player.y, '+'+val, '#00ff88');
      }
      if (act === "SHIELD" && player) {
        player.shield = 300;
        spawnRing(player.x, player.y, '#00e5ff', 60);
        addFeed(`🛡️ ${player.name} tem escudo!`, '#00e5ff');
      }
      if (act.startsWith("POWER_") && player) {
        const pid = act.replace("POWER_","").toLowerCase();
        player.setPower(pid);
      }
      if (act === "KILLALL") {
        players.forEach(p => { if (p.name !== d.uniqueId) p.hp = 0; });
        flashArena('#ff0050');
        addFeed(`☠ MASSACRE por ${d.uniqueId}`, '#ff0050');
      }
      if (act === "WIN" && player) player.wins++;
    } catch(err) { console.log(err); }
  };
}

/* ══════════════════════════════════════
   CONFIG PAINEL ORIGINAL[cite: 3, 10]
══════════════════════════════════════ */
function renderEvents() {
  const el = document.getElementById("event-list");
  el.innerHTML = "";
  Object.entries(eventMappings).forEach(([c,a]) => {
    const div = document.createElement("div");
    div.className = "event-item";
    div.innerHTML = `<span>${c} → ${a}</span><button class="deleteBtn" onclick="deleteEvent('${c}')">✕</button>`;
    el.appendChild(div);
  });
}
function addEvent() {
  const c = document.getElementById("cmdInput").value.trim().toLowerCase();
  const a = document.getElementById("actionSelect").value;
  if (!c) return;
  eventMappings[c] = a;
  localStorage.setItem("blade_mappings", JSON.stringify(eventMappings));
  renderEvents();
}
function deleteEvent(cmd) {
  delete eventMappings[cmd];
  localStorage.setItem("blade_mappings", JSON.stringify(eventMappings));
  renderEvents();
}
document.getElementById("configBtn").onclick = () => {
  const m = document.getElementById("configModal");
  m.style.display = m.style.display === "block" ? "none" : "block";
};

/* ══════════════════════════════════════
   LOOP PRINCIPAL ORIGINAL[cite: 3, 10]
══════════════════════════════════════ */
const starsBg = (() => {
  const off = document.createElement('canvas');
  off.width  = 700; off.height = 700;
  const c = off.getContext('2d');
  c.fillStyle = '#03040a';
  c.fillRect(0,0,700,700);
  for (let i = 0; i < 200; i++) {
    const x = Math.random()*700, y = Math.random()*700;
    const s = Math.random()*1.5+0.3;
    const a = Math.random()*0.6+0.2;
    c.globalAlpha = a;
    c.fillStyle   = `hsl(${200+Math.random()*60},80%,90%)`;
    c.beginPath(); c.arc(x,y,s,0,Math.PI*2); c.fill();
  }
  c.globalAlpha = 1;
  const ng = c.createRadialGradient(350,350,0,350,350,300);
  ng.addColorStop(0,'rgba(50,0,80,0.3)');
  ng.addColorStop(0.5,'rgba(0,20,60,0.15)');
  ng.addColorStop(1,'transparent');
  c.fillStyle = ng;
  c.fillRect(0,0,700,700);
  return off;
})();

function loop() {
  ctx.clearRect(0,0,700,700);

  if (arenaBg.complete && arenaBg.naturalWidth) {
    ctx.drawImage(arenaBg, 0,0,700,700);
  } else {
    ctx.drawImage(starsBg, 0,0,700,700);
  }

  ctx.save();
  ctx.strokeStyle = 'rgba(0,229,255,0.04)';
  ctx.lineWidth   = 0.5;
  for (let x = 0; x <= 700; x += 70) {
    ctx.beginPath(); ctx.moveTo(x,0); ctx.lineTo(x,700); ctx.stroke();
  }
  for (let y = 0; y <= 700; y += 70) {
    ctx.beginPath(); ctx.moveTo(0,y); ctx.lineTo(700,y); ctx.stroke();
  }
  ctx.restore();

  players.forEach(p => { p.update(); p.draw(); });
  combat();
  drawParticles();

  damages = damages.filter(d => d.life > 0);
  damages.forEach(d => {
    d.y   -= 1.8;
    d.life--;
    ctx.save();
    ctx.globalAlpha  = d.life/50;
    ctx.font         = `bold ${d.size||22}px Orbitron`;
    ctx.textAlign    = 'center';
    ctx.shadowBlur   = 12;
    ctx.shadowColor  = d.color;
    ctx.strokeStyle  = 'rgba(0,0,0,0.8)';
    ctx.lineWidth    = 4;
    ctx.fillStyle    = d.color;
    ctx.strokeText(d.text, d.x, d.y);
    ctx.fillText(d.text, d.x, d.y);
    ctx.restore();
  });

  requestAnimationFrame(loop);
}
